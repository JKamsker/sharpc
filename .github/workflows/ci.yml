name: ci

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  NUGET_XMLDOC_MODE: skip
  # Tag pushes use the tag (vX.Y.Z -> X.Y.Z); every other run gets a CI prerelease
  # version. The actual computation happens in the `version` step below.
  CONFIGURATION: Release
  # Opt into Node 24 ahead of the June 2026 deprecation cutoff for the runner's
  # default. Removes the "Node 20 is deprecated" warning on every step.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-test-pack:
    name: Build, test, pack
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@v4
        with:
          # Existing GameService sample targets net9; SourceGenerator.Tests targets net8.
          # Listing both lets the build resolve both target frameworks.
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Compute version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            ver="${GITHUB_REF#refs/tags/v}"
          else
            ver="1.0.0-ci.${GITHUB_RUN_NUMBER}"
          fi
          echo "version=${ver}" >> "$GITHUB_OUTPUT"
          echo "Resolved package version: ${ver}"

      - name: Restore
        run: dotnet restore ShaRPC.sln

      - name: Build
        run: dotnet build ShaRPC.sln -c $CONFIGURATION --no-restore -p:Version=${{ steps.version.outputs.version }}

      - name: Test (SourceGenerator)
        run: |
          dotnet test tests/ShaRPC.SourceGenerator.Tests/ShaRPC.SourceGenerator.Tests.csproj \
            -c $CONFIGURATION --no-build --logger "trx;LogFileName=sourcegen-tests.trx" \
            --results-directory artifacts/test-results

      - name: Test (Core integration)
        # ShaRPC.Tests targets net9.0; with both SDKs installed `dotnet test` runs it on the
        # net9 runtime that ships with the SDK.
        run: |
          dotnet test tests/ShaRPC.Tests/ShaRPC.Tests.csproj \
            -c $CONFIGURATION --no-build --logger "trx;LogFileName=core-tests.trx" \
            --results-directory artifacts/test-results

      - name: Pack
        run: |
          mkdir -p artifacts/nupkg
          # ShaRPC.Core packs as the bundled "ShaRPC" package (runtime core + the
          # source generator), so the generator is no longer packed standalone.
          for proj in \
              src/ShaRPC.Core/ShaRPC.Core.csproj \
              src/ShaRPC.Serializers.MessagePack/ShaRPC.Serializers.MessagePack.csproj \
              src/ShaRPC.Transports.Tcp/ShaRPC.Transports.Tcp.csproj \
              src/ShaRPC.Transports.NamedPipes/ShaRPC.Transports.NamedPipes.csproj; do
            dotnet pack "$proj" -c $CONFIGURATION --no-build -o artifacts/nupkg \
              -p:Version=${{ steps.version.outputs.version }}
          done
          ls -lah artifacts/nupkg

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: |
            artifacts/nupkg/*.nupkg
            artifacts/nupkg/*.snupkg
          if-no-files-found: error
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: artifacts/test-results/**
          if-no-files-found: ignore
          retention-days: 7

  benchmarks:
    name: Benchmarks
    needs: build-test-pack
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: 8.0.x

      - name: Restore benchmarks
        run: dotnet restore tests/ShaRPC.Benchmarks/ShaRPC.Benchmarks.csproj

      - name: Run benchmarks
        run: |
          mkdir -p artifacts/benchmarks/raw
          dotnet run -c $CONFIGURATION --project tests/ShaRPC.Benchmarks -- \
            --filter "*" \
            --job short \
            --warmupCount 1 \
            --iterationCount 3 \
            --exporters json \
            --artifacts artifacts/benchmarks/raw \
            --stopOnFirstError

      - name: Download previous benchmark artifacts
        if: always()
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          BENCHMARK_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          $ErrorActionPreference = 'Stop'
          if ($PSVersionTable.PSVersion.Major -ge 7) {
            $PSNativeCommandUseErrorActionPreference = $true
          }

          New-Item -ItemType Directory -Force -Path artifacts/benchmark-history | Out-Null
          try {
            $runsJson = gh run list `
              --repo $env:GITHUB_REPOSITORY `
              --workflow ci.yml `
              --branch $env:BENCHMARK_BRANCH `
              --status success `
              --limit 20 `
              --json databaseId
            $runs = $runsJson | ConvertFrom-Json
            foreach ($run in $runs) {
              $target = "artifacts/benchmark-history/$($run.databaseId)"
              New-Item -ItemType Directory -Force -Path $target | Out-Null
              try {
                gh run download $run.databaseId `
                  --repo $env:GITHUB_REPOSITORY `
                  --name benchmark-results `
                  --dir $target
              }
              catch {
                Write-Host "No benchmark-results artifact for run $($run.databaseId)."
              }
            }
          }
          catch {
            Write-Host "Benchmark history unavailable: $_"
          }
          finally {
            $global:LASTEXITCODE = 0
          }

      - name: Summarize benchmarks
        if: always()
        shell: pwsh
        env:
          BENCHMARK_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          ./scripts/Write-BenchmarkSummary.ps1 `
            -ResultsDirectory artifacts/benchmarks/raw/results `
            -OutputDirectory artifacts/benchmarks `
            -HistoryDirectory artifacts/benchmark-history `
            -RunNumber $env:GITHUB_RUN_NUMBER `
            -CommitSha $env:GITHUB_SHA `
            -Branch $env:BENCHMARK_BRANCH `
            -Repository $env:GITHUB_REPOSITORY
          Get-Content artifacts/benchmarks/benchmark-summary.md |
            Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: benchmark-results
          path: artifacts/benchmarks/**
          if-no-files-found: error
          retention-days: 30

  publish-nuget:
    name: Publish to NuGet.org
    needs: [build-test-pack, benchmarks]
    runs-on: ubuntu-latest
    # Publish only from this repo on a push to main or a version tag — never from
    # pull requests or forks (the Bitwarden access token only lives on JKamsker/sharpc).
    if: >-
      github.event_name == 'push' &&
      github.repository == 'JKamsker/sharpc' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
    steps:
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Download NuGet packages
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/nupkg

      - name: Fetch NuGet API key from Bitwarden
        uses: bitwarden/sm-action@v2
        with:
          access_token: ${{ secrets.BW_ACCESS_TOKEN }}
          base_url: https://vault.bitwarden.eu
          secrets: |
            265b2fb6-2cf0-4859-9bc8-b24c00ab4378 > NUGET_API_KEY

      - name: Push to NuGet.org
        run: |
          dotnet nuget push "artifacts/nupkg/*.nupkg" \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
          echo "Published version: ${{ needs.build-test-pack.outputs.version }}"
